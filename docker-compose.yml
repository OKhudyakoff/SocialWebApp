services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/social.db  # сохраняем БД
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: